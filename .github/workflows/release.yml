# Publishes a GitHub Release whenever a version tag is pushed.
# Everyone who has clicked Watch → Custom → Releases gets notified by GitHub.
#
#   git tag v1.0.1 && git push origin v1.0.1
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
