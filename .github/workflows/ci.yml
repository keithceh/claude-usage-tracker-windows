name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check all JavaScript
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.js -Exclude *.min.js | ForEach-Object {
            node --check $_.FullName
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }

      - name: Collector smoke run (no tool logs present — must still exit 0)
        run: node collect-usage.js

      - name: data.js was produced
        shell: pwsh
        run: if (-not (Test-Path data/data.js)) { exit 1 }
