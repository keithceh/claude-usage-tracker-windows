<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <!-- Dark background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0f1629"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- Border ring -->
  <rect x="3" y="3" width="506" height="506" rx="109" ry="109" fill="none" stroke="url(#bgGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Chart area background -->
  <rect x="96" y="96" width="320" height="320" rx="24" ry="24" fill="#131b2e" opacity="0.6"/>

  <!-- Grid lines -->
  <line x1="120" y1="176" x2="392" y2="176" stroke="#1e293b" stroke-width="0.75" stroke-dasharray="3,5" opacity="0.4"/>
  <line x1="120" y1="236" x2="392" y2="236" stroke="#1e293b" stroke-width="0.75" stroke-dasharray="3,5" opacity="0.4"/>
  <line x1="120" y1="296" x2="392" y2="296" stroke="#1e293b" stroke-width="0.75" stroke-dasharray="3,5" opacity="0.4"/>
  <line x1="120" y1="356" x2="392" y2="356" stroke="#253147" stroke-width="1.5" opacity="0.6"/>

  <!-- Bars -->
  <g>
    <rect x="136" y="200" width="44" height="156" rx="8" ry="8" fill="url(#bar1)" opacity="0.92"/>
    <rect x="202" y="140" width="44" height="216" rx="8" ry="8" fill="url(#bar2)" opacity="0.92"/>
    <rect x="268" y="176" width="44" height="180" rx="8" ry="8" fill="url(#bar3)" opacity="0.92"/>
    <rect x="334" y="116" width="44" height="240" rx="8" ry="8" fill="url(#bar4)" opacity="0.92"/>
  </g>

  <!-- Trend line -->
  <g>
    <polyline 
      points="158,188 224,148 290,168 356,120" 
      fill="none" 
      stroke="url(#lineGrad)" 
      stroke-width="3.5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      opacity="0.95"
    />
    <circle cx="158" cy="188" r="4.5" fill="#fbbf24"/>
    <circle cx="224" cy="148" r="4.5" fill="#f59e0b"/>
    <circle cx="290" cy="168" r="4.5" fill="#e879a0"/>
    <circle cx="356" cy="120" r="4.5" fill="#fb7185"/>
  </g>

  <!-- Dollar sign accent -->
  <text x="378" y="105" font-family="system-ui, sans-serif" font-weight="700" font-size="36" fill="url(#bgGrad)" opacity="0.2">$</text>
</svg>
